services:
  postgres:
    image: postgres:16-alpine
    container_name: dela-langa-db
    environment:
      POSTGRES_USER: delalanga
      POSTGRES_PASSWORD: delalanga2026
      POSTGRES_DB: delalanga
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delalanga -d delalanga"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
